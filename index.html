<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statspack Training Portal</title>

<!-- JaaS External API -->
<script src="https://8x8.vc/vpaas-magic-cookie-2bf4fd115a2c4bb2abdae6ac8c4207a7/external_api.js" async></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ───── YOUR FULL CSS (UNCHANGED FOR BREVITY) ───── */
/* Keep your existing CSS exactly as-is */
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <img src="logo.png" alt="Statspack" class="logo">
</header>

<!-- NAV -->
<nav class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('meeting')">Live Meeting Room</button>
  <button class="nav-tab" onclick="switchTab('register')">Register for Training</button>
</nav>

<!-- MEETING SECTION -->
<section id="tab-meeting" class="section active meeting-section">
  <div id="password-gate">
    <input type="password" id="room-password" placeholder="Enter password">
    <button onclick="unlockMeeting()">Enter</button>
  </div>

  <div id="meeting-area" style="display:none;">
    <div id="jaas-container"></div>
  </div>
</section>

<!-- REGISTRATION SECTION -->
<section id="tab-register" class="section form-section">

<div class="form-card">
<h2>Training Registration</h2>

<div id="form-feedback"></div>

<form id="training-form" onsubmit="submitForm(event)">

  <input type="text" name="full_name" placeholder="Full Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="tel" name="phone" placeholder="Phone" required>

  <select name="country" required>
    <option value="">Select Country</option>
    <option>Lesotho</option>
    <option>South Africa</option>
  </select>

  <input type="text" name="city" placeholder="City" required>

  <div>
    <label><input type="radio" name="has_requirements" value="Yes" required> Yes</label>
    <label><input type="radio" name="has_requirements" value="No"> No</label>
  </div>

  <input type="text" name="preferred_time" placeholder="Preferred Time">

  <textarea name="notes" placeholder="Notes"></textarea>

  <button type="submit" id="submit-btn">Submit Registration</button>

</form>
</div>

</section>

<!-- FOOTER -->
<footer class="footer">
© 2026 Statspack
</footer>

<script>
/* ───── EMAILJS SETUP ───── */
const EMAILJS_SERVICE_ID  = 'service_p4ybasm';
const EMAILJS_TEMPLATE_ID = 'template_6q100il';
const EMAILJS_PUBLIC_KEY  = 'Ff0na9fvMYI90piCy';

(function(){
  emailjs.init(EMAILJS_PUBLIC_KEY);
})();

/* ───── FORM SUBMISSION ───── */
function submitForm(e) {
  e.preventDefault();

  const form = document.getElementById('training-form');
  const btn = document.getElementById('submit-btn');
  const feedback = document.getElementById('form-feedback');

  btn.disabled = true;
  btn.textContent = "Sending...";

  emailjs.sendForm(
    EMAILJS_SERVICE_ID,
    EMAILJS_TEMPLATE_ID,
    form
  )
  .then(() => {
    feedback.style.display = "block";
    feedback.style.color = "green";
    feedback.textContent = "✓ Registration submitted successfully!";
    form.reset();
    btn.disabled = false;
    btn.textContent = "Submit Registration";
  })
  .catch((err) => {
    console.error(err);
    feedback.style.display = "block";
    feedback.style.color = "red";
    feedback.textContent = "✗ Failed to send. Try again.";
    btn.disabled = false;
    btn.textContent = "Submit Registration";
  });
}

/* ───── TAB SWITCH ───── */
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

/* ───── MEETING PASSWORD ───── */
const ROOM_PASSWORD = "VMS";

function unlockMeeting() {
  const input = document.getElementById('room-password');

  if (input.value === ROOM_PASSWORD) {
    document.getElementById('password-gate').style.display = "none";
    document.getElementById('meeting-area').style.display = "block";

    launchJitsi();
  } else {
    alert("Wrong password");
  }
}

function launchJitsi() {
  new JitsiMeetExternalAPI('8x8.vc', {
    roomName: 'vpaas-magic-cookie-2bf4fd115a2c4bb2abdae6ac8c4207a7/StatspackPlatform',
    parentNode: document.querySelector('#jaas-container')
  });
}
</script>

</body>
</html>
